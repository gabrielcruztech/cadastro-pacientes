<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Pacientes</title>
  <link rel="stylesheet" href="/style.css?v=20260506-2">
</head>
<body>

  <div class="container">

    <header>
      <h1>🏥 Cadastro de Pacientes</h1>
    </header>

    <!-- Mensagem de feedback -->
    <div id="mensagem" class="mensagem" style="display:none;"></div>

    <!-- Campo oculto para armazenar o ID durante edição -->
    <input type="hidden" id="paciente-id" />

    <!-- Formulário de cadastro / edição -->
    <section class="card">
      <h2 class="form-titulo">Novo Paciente</h2>

      <form id="form-paciente" novalidate>

        <div class="campo">
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            placeholder="Ex: Maria Silva"
            required
            maxlength="150"
          />
        </div>

        <div class="campo">
          <label for="celular">Celular</label>
          <input
            type="tel"
            id="celular"
            placeholder="Ex: (71) 99999-9999"
            required
            maxlength="20"
          />
        </div>

        <div class="campo">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            placeholder="Ex: maria@email.com"
            required
            maxlength="150"
          />
        </div>

        <div class="botoes">
          <button type="submit" class="btn-primario">Salvar</button>
          <button type="button" id="btn-cancelar" class="btn-secundario" style="display:none;">
            Cancelar
          </button>
        </div>

      </form>
    </section>

    <!-- Tabela de pacientes -->
    <section class="card">
      <h2>Pacientes Cadastrados</h2>

      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Celular</th>
              <th>E-mail</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-body">
            <tr>
              <td colspan="4" style="text-align:center;">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- Importa main.js como módulo ES para suportar o import do supabase.js -->
  <script type="module" src="main.js"></script>

</body>
</html>
